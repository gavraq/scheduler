defaults:
  target_url: http://localhost:8095/scheduled-job
  timezone: Europe/London
jobs:
- name: weekly-regulatory-scan
  description: Comprehensive scan of all major regulators
  enabled: true
  schedule: 0 9 * * 1
  project: /Volumes/DockSSD/projects/riskagents
  prompt: Run a regulatory monitoring scan for job 'weekly-regulatory-scan'. Use the
    regulatory-monitor skill.
  model: sonnet
  max_turns: 35
  timeout_seconds: 600
- name: daily-pra-fca-check
  description: Quick daily check for critical PRA/FCA announcements
  enabled: true
  schedule: 0 8 * * 1-5
  project: /Volumes/DockSSD/projects/riskagents
  prompt: Run a quick regulatory check focusing on PRA and FCA announcements only.
    Use the regulatory-monitor skill.
  model: sonnet
  max_turns: 25
  timeout_seconds: 600
- name: monthly-basel-frtb-review
  description: Deep analysis of Basel 3.1 and FRTB developments
  enabled: false
  schedule: 0 10 1 * *
  project: /Volumes/DockSSD/projects/riskagents
  prompt: Run a deep regulatory scan focused on Basel 3.1/CRR III and FRTB developments.
    Use the regulatory-monitor skill.
  model: sonnet
  max_turns: 35
  timeout_seconds: 900
