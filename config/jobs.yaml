defaults:
  target_url: http://localhost:8095/scheduled-job
  timezone: Europe/London
jobs:
- name: weekly-regulatory-scan
  description: Comprehensive scan of all major regulators
  enabled: true
  schedule: 0 9 * * 1
  project: /Volumes/DockSSD/projects/riskagents
  prompt: Run a regulatory monitoring scan for job 'weekly-regulatory-scan'. Use the
    regulatory-monitor skill.
  model: sonnet
  max_turns: 35
  timeout_seconds: 600
- name: daily-pra-fca-check
  description: Quick daily check for critical PRA/FCA announcements
  enabled: true
  schedule: 0 8 * * 1-5
  project: /Volumes/DockSSD/projects/riskagents
  prompt: Run a quick regulatory check focusing on PRA and FCA announcements only.
    Use the regulatory-monitor skill.
  model: sonnet
  max_turns: 25
  timeout_seconds: 600
- name: daily-reflect
  description: Daily memory consolidation — reflect on yesterday's sessions
  enabled: true
  schedule: 0 2 * * *
  project: /Volumes/DockSSD/projects/life
  prompt: scripts/daily_reflect.ts
  model: sonnet
  max_turns: 1
  timeout_seconds: 300
  target_url: http://192.168.5.192:8096/run
- name: daily-data-collect
  description: Collect all daily data (health, location, water, energy, email, calendar) for yesterday
  enabled: true
  schedule: 0 8 * * *
  project: /Volumes/DockSSD/projects/life
  prompt: scripts/collectors/collect_all.py
  model: sonnet
  max_turns: 1
  timeout_seconds: 120
  target_url: http://192.168.5.192:8096/run
- name: daily-note-generate
  description: Generate previous day's daily note from collected data
  enabled: true
  schedule: 30 8 * * *
  project: /Volumes/DockSSD/projects/life
  prompt: scripts/generate_daily_note.ts
  model: sonnet
  max_turns: 1
  timeout_seconds: 300
  target_url: http://192.168.5.192:8096/run
- name: daily-brief-generate
  description: Generate personalised daily news briefing via WebSearch
  enabled: true
  schedule: 0 7 * * *
  project: /Volumes/DockSSD/projects/life
  prompt: scripts/generate_daily_brief.ts
  model: sonnet
  max_turns: 1
  timeout_seconds: 600
  target_url: http://192.168.5.192:8096/run
- name: weekly-docs-check
  description: Validate life-vault/docs/ — broken wikilinks, stale docs, frontmatter issues
  enabled: true
  schedule: 0 9 * * 0
  project: /Volumes/DockSSD/projects/life
  prompt: scripts/check_docs.ts
  model: sonnet
  max_turns: 1
  timeout_seconds: 60
  target_url: http://192.168.5.192:8096/run
- name: gousto-weekly-sync
  description: Sync Gousto order history into the Slater Kitchen meal app (meals.gavinslater.co.uk).
    Validates the API token, re-scrapes via Selenium if expired (emails Gavin on
    reCAPTCHA), then triggers the Pi /api/sync rebuild. Migrated from the OpenClaw
    "Gousto Delivery Sync Reminder" cron.
  enabled: true
  schedule: 0 18 * * 0
  project: /Volumes/DockSSD/projects/life
  prompt: scripts/gousto_sync.py
  model: sonnet
  max_turns: 1
  timeout_seconds: 360
  target_url: http://192.168.5.192:8096/run
- name: water-alert
  description: iMessage alert if recent daily water usage exceeds 800L. Script-first
    (no LLM), silent unless breach. Migrated from the OpenClaw/hermes water job.
  enabled: true
  schedule: 30 9 * * *
  project: /Volumes/DockSSD/projects/life
  prompt: scripts/water_alert.py
  model: sonnet
  max_turns: 1
  timeout_seconds: 60
  target_url: http://192.168.5.192:8096/run
- name: turtlelake-temp
  description: TurtleLake (Minnesota) temperature monitor — iMessage on freeze risk
    (<45F urgent / <48F warn), unexpectedly warm (>85F), or HA unreachable.
    Script-first, reads HA over ZeroTier. Migrated from the OpenClaw/hermes job.
  enabled: true
  schedule: 0 14 * * *
  project: /Volumes/DockSSD/projects/life
  prompt: scripts/turtlelake_temp.py
  model: sonnet
  max_turns: 1
  timeout_seconds: 60
  target_url: http://192.168.5.192:8096/run
- name: accountability-morning
  description: AI accountability partner (morning) — Telegram check-in via claude -p
    over identity/goals/scratch/yesterday + its own journal. Migrated from
    hermes/OpenClaw as a genuine AI job, not a reminder.
  enabled: true
  schedule: 0 10 * * 1-5
  project: /Volumes/DockSSD/projects/life
  prompt: scripts/accountability.py --slot morning
  model: sonnet
  max_turns: 1
  timeout_seconds: 200
  target_url: http://192.168.5.192:8096/run
- name: accountability-midday
  description: AI accountability partner — early-afternoon course-correct (Telegram).
  enabled: true
  schedule: 0 13 * * 1-5
  project: /Volumes/DockSSD/projects/life
  prompt: scripts/accountability.py --slot midday
  model: sonnet
  max_turns: 1
  timeout_seconds: 200
  target_url: http://192.168.5.192:8096/run
- name: accountability-evening
  description: AI accountability partner — late-afternoon close-out (Telegram).
  enabled: true
  schedule: 0 16 * * 1-5
  project: /Volumes/DockSSD/projects/life
  prompt: scripts/accountability.py --slot evening
  model: sonnet
  max_turns: 1
  timeout_seconds: 200
  target_url: http://192.168.5.192:8096/run
- name: telegram-respond
  description: Live two-way responder for the accountability bot — sole getUpdates
    consumer; captures replies to inbox.jsonl, responds via claude -p, and acts on
    requests (tick/add scratch items). Supersedes telegram-ingest.
  enabled: true
  schedule: "*/5 7-22 * * *"
  project: /Volumes/DockSSD/projects/life
  prompt: scripts/telegram_respond.py
  model: sonnet
  max_turns: 1
  timeout_seconds: 200
  target_url: http://192.168.5.192:8096/run
- name: monthly-basel-frtb-review
  description: Deep analysis of Basel 3.1 and FRTB developments
  enabled: false
  schedule: 0 10 1 * *
  project: /Volumes/DockSSD/projects/riskagents
  prompt: Run a deep regulatory scan focused on Basel 3.1/CRR III and FRTB developments.
    Use the regulatory-monitor skill.
  model: sonnet
  max_turns: 35
  timeout_seconds: 900

# ---------------------------------------------------------------------------
# MIRRORS — routines that actually execute on Anthropic's claude.ai Code
# routines infrastructure (not on this Pi). Listed here (disabled) so they
# appear on the dashboard for visibility. To manage the real routine, use the
# claude.ai link in the description.
# ---------------------------------------------------------------------------

- name: mirror-birthday-hr-zone-refresh
  description: 'MIRROR ONLY (runs on Anthropic cloud, not Pi). Annual auto-refresh
    of Gavin''s HR zones + BMR in life-vault on each birthday. Increments age
    in USER.md, recomputes max HR / zone bpm bands / BMR / maintenance targets,
    commits + pushes to gavraq/life-vault, emails gavin.n.slater@gmail.com with
    the deltas. Routine id trig_01KEY34WdGmdNAb6AKM3PURC — manage at
    https://claude.ai/code/routines/trig_01KEY34WdGmdNAb6AKM3PURC'
  enabled: false
  schedule: 0 8 2 6 *
  project: anthropic-cloud
  prompt: (remote — see description)
  model: sonnet
  max_turns: 0
  timeout_seconds: 0
