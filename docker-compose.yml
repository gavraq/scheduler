services:
  cron-scheduler:
    build: .
    container_name: cron-scheduler
    restart: unless-stopped
    ports:
      - "8092:8092"
    volumes:
      - ./config:/app/config:ro
      - scheduler-data:/app/data
    environment:
      - AGENT_API_KEY=${AGENT_API_KEY}
      - SCHEDULER_API_KEY=${SCHEDULER_API_KEY:-}
      - HOST=0.0.0.0
      - PORT=8092
      - TZ=Europe/London
    networks:
      - personal-ai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8092/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  scheduler-data:

networks:
  personal-ai:
    external: true
